<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="assets/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0D1B2A" />

    <!-- ═══════════════════════════════════════════════════════════
         SEO CORE — Title, Description, Canonical, Robots
    ═══════════════════════════════════════════════════════════ -->
    <title>ICE-TECH | Premium Artisanal Ice Cream Est. 1990</title>
    <meta name="description" content="ICE-TECH – Est. 1990. Over 35 years of crafting fresh, creamy soft serves, shakes & signature cones across Gujranwala, Lahore, and Sialkot with premium ingredients." />
    <meta name="keywords" content="ice cream, artisanal ice cream, soft serve, premium desserts, ICE-TECH, Gujranwala, Lahore, Sialkot" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://www.ice-tech.com/" />

    <!-- ═══════════════════════════════════════════════════════════
         OPEN GRAPH — Social Sharing (Facebook, LinkedIn, WhatsApp)
    ═══════════════════════════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.ice-tech.com/" />
    <meta property="og:title" content="ICE-TECH | Premium Artisanal Ice Cream Est. 1990" />
    <meta property="og:description" content="Over 35 years of crafting premium fresh, creamy soft serves, shakes & signature cones across Pakistan." />
    <meta property="og:image" content="https://www.ice-tech.com/assets/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_PK" />
    <meta property="og:site_name" content="ICE-TECH" />

    <!-- ═══════════════════════════════════════════════════════════
         TWITTER CARD
    ═══════════════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ICE-TECH | Premium Artisanal Ice Cream Est. 1990" />
    <meta name="twitter:description" content="Over 35 years crafting premium ice cream across Pakistan." />
    <meta name="twitter:image" content="https://www.ice-tech.com/assets/og-image.jpg" />

    <!-- ═══════════════════════════════════════════════════════════
         PERFORMANCE — Font Preloads (eliminates FOUT/FOIT)
         Preload the woff2 file Google Fonts ultimately serves.
         This tells the browser to start fetching fonts BEFORE
         the CSS is even parsed — critical for LCP text nodes.
    ═══════════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Single consolidated Google Fonts request (saves 1 round-trip vs two <link> tags) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Syncopate:wght@400;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    />

    <!-- ═══════════════════════════════════════════════════════════
         STRUCTURED DATA — Organization / LocalBusiness (JSON-LD)
         Gives Google rich result eligibility and Knowledge Panel data.
    ═══════════════════════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": ["Organization", "FoodEstablishment"],
      "name": "ICE-TECH",
      "alternateName": "Ice-Tech Parlour",
      "description": "ICE-TECH is a premium artisanal ice cream brand established in 1990, crafting fresh soft serves, shakes, and signature cones across Gujranwala, Lahore, and Sialkot.",
      "url": "https://www.ice-tech.com",
      "logo": "https://www.ice-tech.com/assets/logo.png",
      "image": "https://www.ice-tech.com/assets/og-image.jpg",
      "foundingDate": "1990",
      "servesCuisine": "Ice Cream & Desserts",
      "priceRange": "$$",
      "sameAs": [
        "https://www.instagram.com/icetechparlour",
        "https://www.facebook.com/icetechparlour"
      ],
      "address": [
        {
          "@type": "PostalAddress",
          "addressLocality": "Gujranwala",
          "addressCountry": "PK"
        },
        {
          "@type": "PostalAddress",
          "addressLocality": "Lahore",
          "addressCountry": "PK"
        },
        {
          "@type": "PostalAddress",
          "addressLocality": "Sialkot",
          "addressCountry": "PK"
        }
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-555-423-2732",
        "contactType": "customer service",
        "email": "hello@ice-tech.com"
      }
    }
    </script>
  </head>
  <body style="margin:0;padding:0;background:#0D1B2A;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
